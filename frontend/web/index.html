<html lang="zh-CN">

<head>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
            max-height: 80vh;
            overflow-y: auto;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #667eea;
            color: #667eea;
        }

        .input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 12px;
        }

        .input:focus {
            outline: none;
            border-color: #667eea;
        }

        .word-card {
            background: #f8fafc;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .word {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .phonetic {
            color: #6b7280;
            font-style: italic;
        }

        .meaning {
            font-size: 18px;
            color: #374151;
            margin: 8px 0;
        }

        .example {
            color: #9ca3af;
            font-style: italic;
        }

        .progress-bar {
            height: 20px;
            background: #e5e7eb;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.5s;
        }

        .nav {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .nav-btn {
            padding: 14px 12px;
            border: none;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            text-align: center;
            transition: all 0.3s;
        }

        .nav-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .nav-btn.active {
            background: rgba(255, 255, 255, 0.9);
            color: #667eea;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .nav-btn.logout-btn {
            background: rgba(239, 68, 68, 0.8);
            grid-column: span 2;
        }

        .nav-btn.logout-btn:hover {
            background: rgba(239, 68, 68, 1);
        }

        .hidden {
            display: none !important;
        }

        .rating {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .star {
            font-size: 32px;
            cursor: pointer;
            color: #e5e7eb;
            transition: color 0.2s;
        }

        .star:hover,
        .star.selected {
            color: #fbbf24;
        }

        .speak-btn {
            background: #667eea;
            color: white;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            cursor: pointer;
            font-size: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .speak-btn:hover {
            transform: scale(1.1);
        }

        .quiz-option {
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 8px;
        }

        .quiz-option:hover {
            border-color: #667eea;
            background: #f8fafc;
        }

        .quiz-option.selected {
            border-color: #667eea;
            border-width: 2px;
            background: #667eea;
            color: white;
            font-weight: bold;
        }

        .quiz-option.selected::before {
            content: '鉁?';
        }

        .quiz-option-letter {
            display: inline-block;
            width: 24px;
            height: 24px;
            line-height: 24px;
            text-align: center;
            border-radius: 50%;
            background: #e5e7eb;
            color: #374151;
            margin-right: 8px;
            font-weight: bold;
        }

        .quiz-option.selected .quiz-option-letter {
            background: white;
            color: #667eea;
        }

        .quiz-option-text {
            flex: 1;
        }

        .quiz-option-check {
            display: none;
            color: white;
            font-weight: bold;
            margin-left: 8px;
        }

        .quiz-option.selected .quiz-option-check {
            display: inline;
        }

        .quiz-option.correct {
            border-color: #10b981;
            background: #d1fae5;
        }

        .quiz-option.wrong {
            border-color: #ef4444;
            background: #fee2e2;
        }

        .quiz-option-dontknow {
            border-style: dashed;
            border-color: #9ca3af;
            color: #6b7280;
            background: #f9fafb;
        }

        .quiz-option-dontknow:hover {
            border-color: #6b7280;
            background: #f3f4f6;
        }

        .quiz-option-dontknow.selected {
            border-style: solid;
            border-color: #9ca3af;
            background: #f3f4f6;
        }
    </style>
</head>

        function toggleLessonSpeech(text) {
            if (!('speechSynthesis' in window)) {

                return;
            }

            const btn = document.querySelector('[onclick^="toggleLessonSpeech"]');
            if (!btn) return;

            if (isSpeaking) {
                window.speechSynthesis.pause();
                isSpeaking = false;
                btn.innerHTML = '鈻讹笍 缁х画';
            } else {
                if (window.speechSynthesis.paused) {
                    window.speechSynthesis.resume();
                    isSpeaking = true;
                    btn.innerHTML = '鈴革笍 鏆傚仠';
                } else {
                    window.speechSynthesis.cancel();
                    currentLessonText = text;
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.lang = 'en-US';
                    utterance.rate = 0.7;
                    utterance.pitch = 1;
                    utterance.onend = () => {
                        isSpeaking = false;
                        if (btn) btn.innerHTML = '馃攰 鏈楄璇炬枃';
                    };
                    utterance.onerror = () => {
                        isSpeaking = false;
                        if (btn) btn.innerHTML = '馃攰 鏈楄璇炬枃';
                    };
                    window.speechSynthesis.speak(utterance);
                    isSpeaking = true;
                    btn.innerHTML = '鈴革笍 鏆傚仠';
                }
            }
        }

        function submitRating() {
            if (!currentRating) {
                alert('璇烽€夋嫨璇勫垎');
                return;
            }
            const wordId = currentLearningWord.id;
            if (!currentUser.wordProgress[wordId]) {
                currentUser.wordProgress[wordId] = {
                    repetitions: 0,
                    interval: 1,
                    easeFactor: 2.5,
                    nextReviewDate: new Date().toISOString(),
                    status: 'learning'
                };
                currentUser.totalWordsLearned++;
                currentUser.progress.learning++;
            }

            const progress = currentUser.wordProgress[wordId];
            if (currentRating >= 4) {
                if (progress.repetitions === 0) {
                    progress.interval = 1;
                } else if (progress.repetitions === 1) {
                    progress.interval = 6;
                } else {
                    progress.interval = Math.round(progress.interval * progress.easeFactor);
                }
                progress.easeFactor = Math.max(1.3, progress.easeFactor + (0.1 - (5 - currentRating) * (0.08 + (5 - currentRating) * 0.02)));
                progress.repetitions++;
                if (progress.repetitions >= 3 && currentRating >= 4) {
                    progress.status = 'mastered';
                    currentUser.progress.mastered++;
                    currentUser.progress.learning--;
                }
            } else {
                progress.repetitions = 0;
                progress.interval = 1;
                progress.status = 'learning';
            }

            const nextDate = new Date();
            nextDate.setDate(nextDate.getDate() + progress.interval);
            progress.nextReviewDate = nextDate.toISOString();

            updateStreak();
            saveUser();
            closeLearningModal();
            loadOverview();
            alert('瀛︿範璁板綍宸蹭繚瀛橈紒');
        }

                if (currentUser.lastStudyDate === yesterday.toDateString()) {

        function generateRandomQuestions(count) {
            const shuffled = [...words].sort(() => Math.random() - 0.5);
            const selected = shuffled.slice(0, count);

            return selected.map(word => {
                const otherWords = words.filter(w => w.id !== word.id);
                const wrongOptions = [...otherWords].sort(() => Math.random() - 0.5).slice(0, 3);
                const options = [...wrongOptions, { meaning: word.meaning }].sort(() => Math.random() - 0.5);
                const answerIndex = options.findIndex(o => o.meaning === word.meaning);

                return {
                    question: `What is the meaning of "${word.word}"?`,
                    options: options.map(o => o.meaning),
                    answer: answerIndex
                };
            });
        }

        function generateQuiz() {
            const level = currentUser.level || 1;

            for (let i = 1; i <= level; i++) {
                builtInWords.push(...VOCABULARY_BY_LEVEL[i].map(w => ({ ...w, level: i })));
            }

            const aiWords = JSON.parse(localStorage.getItem(getUserKey('english-learning-ai-words')) || '[]').filter(w => w.level <= level);
            const allWords = [...builtInWords, ...aiWords];

            const shuffled = [...allWords].sort(() => Math.random() - 0.5);
            const selected = shuffled.slice(0, 5);

            const questions = selected.map(word => {
                const otherWords = allWords.filter(w => w.word !== word.word);
                const wrongOptions = [...otherWords].sort(() => Math.random() - 0.5).slice(0, 3);
                const options = [...wrongOptions, { meaning: word.meaning }].sort(() => Math.random() - 0.5);
                return {
                    question: `What does "${word.word}" mean?`,
                    options: options.map(o => o.meaning),
                    correctAnswer: word.meaning
                };
            });

            quizAnswers = new Array(questions.length).fill(null);

            const container = document.getElementById('quiz-container');
            container.innerHTML = `
                <div id="quiz-questions">
                    ${questions.map((q, i) => `

        function submitQuiz() {
            if (!window.quizData) return;
            let correct = 0;
            let unanswered = 0;
            window.quizData.forEach((q, i) => {
                if (quizAnswers[i] === null || quizAnswers[i] === undefined) {
                    unanswered++;
                } else {
                    const selectedOption = q.options[quizAnswers[i]];
                    if (selectedOption === q.correctAnswer) {
                        correct++;
                        document.getElementById(`quiz-${i}-${quizAnswers[i]}`).classList.add('correct');
                    } else {
                        document.getElementById(`quiz-${i}-${quizAnswers[i]}`).classList.add('wrong');
                        const correctIdx = q.options.indexOf(q.correctAnswer);
                        addToWrongAnswers(q.question, quizAnswers[i], correctIdx, q.options);

            const total = window.quizData.length;
            const percentage = Math.round((correct / total) * 100);

        function updateVocabSM2(word, rating) {
            if (rating >= 3) {
                if (word.repetitions === 0) {
                    word.interval = 1;
                } else if (word.repetitions === 1) {
                    word.interval = 6;
                } else {
                    word.interval = Math.round(word.interval * word.easeFactor);
                }
                word.easeFactor = Math.max(1.3, word.easeFactor + (0.1 - (5 - rating) * (0.08 + (5 - rating) * 0.02)));
                word.repetitions++;
                if (word.repetitions >= 3 && rating >= 4) {
                    word.status = 'mastered';
                } else if (word.status === 'new') {
                    word.status = 'learning';
                }
            } else {
                word.repetitions = 0;
                word.interval = 1;
                word.status = 'learning';
            }

            const nextDate = new Date();
            nextDate.setDate(nextDate.getDate() + word.interval);
            word.nextReviewDate = nextDate.toISOString();
            word.lastReviewDate = new Date().toISOString();

            const aiWords = JSON.parse(localStorage.getItem(getUserKey('english-learning-ai-words')) || '[]');
            const idx = aiWords.findIndex(w => w.id === word.id);
            if (idx >= 0) {
                aiWords[idx] = word;
                localStorage.setItem(getUserKey('english-learning-ai-words'), JSON.stringify(aiWords));
            }
        }

        function generateFallbackQuiz() {
            const level = currentUser.level || 1;
            const container = document.getElementById('ai-quiz-container');

            const builtInWords = [];
            for (let i = 1; i <= level; i++) {
                builtInWords.push(...VOCABULARY_BY_LEVEL[i].map(w => ({ ...w, level: i })));
            }
            const aiWords = JSON.parse(localStorage.getItem(getUserKey('english-learning-ai-words')) || '[]').filter(w => w.level <= level);
            const allWords = [...builtInWords, ...aiWords];

            if (allWords.length === 0) {
                container.innerHTML = `<p style="color: #ef4444; text-align: center;">鏆傛棤瓒冲璇嶆眹鐢熸垚娴嬭瘯锛岃鍏堝涔犲崟璇?/p>`;
                return;
            }

            const shuffled = [...allWords].sort(() => Math.random() - 0.5);
            const selected = shuffled.slice(0, Math.min(5, allWords.length));

            const questions = selected.map(word => {
                const otherWords = allWords.filter(w => w.word !== word.word);
                const wrongOptions = [...otherWords].sort(() => Math.random() - 0.5).slice(0, 3);
                const options = [...wrongOptions, { meaning: word.meaning }].sort(() => Math.random() - 0.5);
                return {
                    type: 'choice',
                    question: `What does "${word.word}" mean?`,
                    options: options.map(o => o.meaning),
                    answer: word.meaning
                };
            });

            window.aiQuizData = questions;
            window.aiQuizAnswers = [];

            container.innerHTML = `
                <div id="ai-quiz-questions">
                    ${questions.map((q, i) => `
                        <div style="margin-bottom: 20px;">
                            <h4>闂 ${i + 1} (閫夋嫨棰?: ${q.question}</h4>
                            ${q.options.map((opt, j) => `
                                <div class="quiz-option" onclick="selectAIQuizAnswer(${i}, ${j})" id="ai-quiz-${i}-${j}">
                                    <span class="quiz-option-letter">${String.fromCharCode(65 + j)}</span>
                                    <span class="quiz-option-text">${opt}</span>
                                    <span class="quiz-option-check">鉁?/span>
                                </div>
                            `).join('')}
                        </div>
                    `).join('')}
                </div>
                <button class="btn btn-primary" onclick="submitAIQuiz()" style="margin-top: 20px;">鎻愪氦绛旀</button>
            `;
        }

        function selectAIQuizAnswer(idx, optionIdx) {
            if (typeof optionIdx === 'number') {
                window.aiQuizAnswers[idx] = { type: 'choice', idx: optionIdx, answer: window.aiQuizData[idx].options[optionIdx] };
                const options = document.querySelectorAll(`[id^="ai-quiz-${idx}-"]`);
                options.forEach(el => el.classList.remove('selected'));
                document.getElementById(`ai-quiz-${idx}-${optionIdx}`).classList.add('selected');
            } else {
                window.aiQuizAnswers[idx] = { type: 'text', answer: optionIdx };
            }
        }

        async function submitAIQuiz() {
            if (!window.aiQuizData) return;

            let correct = 0;
            window.aiQuizData.forEach((q, i) => {
                const userAnswerObj = window.aiQuizAnswers[i];
                const userAnswer = userAnswerObj ? userAnswerObj.answer : null;
                const isCorrect = userAnswer && userAnswer.toLowerCase().includes(q.answer.toLowerCase());

                if (isCorrect) {
                    correct++;
                    if (q.type === 'choice') {
                        document.getElementById(`ai-quiz-${i}-${userAnswerObj.idx}`).classList.add('correct');
                    }
                } else {
                    if (q.type === 'choice') {
                        if (userAnswerObj) {
                            document.getElementById(`ai-quiz-${i}-${userAnswerObj.idx}`).classList.add('wrong');
                        }
                        const correctIdx = q.options.indexOf(q.answer);
                        if (correctIdx >= 0) {
                            document.getElementById(`ai-quiz-${i}-${correctIdx}`).classList.add('correct');
                        }
                    }
                    addToWrongAnswers(q.question, userAnswer || '', q.answer, q.options || []);
                }
            });

            const total = window.aiQuizData.length;
            const percentage = Math.round((correct / total) * 100);
            alert(`AI娴嬭瘯瀹屾垚锛佸緱鍒嗭細${correct}/${total} (${percentage}%)`);

                btn.classList.add('btn-danger');
                document.getElementById('chat-input').placeholder = '姝ｅ湪鍚偍璇磋瘽...';
                updateVoiceStatus('鉁?楹﹀厠椋庡凡寮€鍚紝璇峰紑濮嬭璇濓紙璇磋嫳璇級');
            };

            voiceRecognition.onresult = function (event) {
                let transcript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    transcript += event.results[i][0].transcript;
                }
                document.getElementById('chat-input').value = transcript;
                updateVoiceStatus('馃摑 璇嗗埆涓細' + transcript);
            };

            voiceRecognition.onend = function () {
                isVoiceInputting = false;
                btn.innerHTML = '馃帳';
                btn.classList.remove('btn-danger');
                btn.classList.add('btn-secondary');
                document.getElementById('chat-input').placeholder = '杈撳叆鑻辫鍙ュ瓙...';
                const finalText = document.getElementById('chat-input').value;
                if (!finalText) {
                    showVoiceInputNotice();
                } else {
                    updateVoiceStatus('鉁?璇嗗埆瀹屾垚');
                }
            };

            voiceRecognition.onerror = function (event) {
                console.error('璇煶璇嗗埆閿欒:', event.error);
                isVoiceInputting = false;
                btn.innerHTML = '馃帳';
                btn.classList.remove('btn-danger');
                btn.classList.add('btn-secondary');
                document.getElementById('chat-input').placeholder = '杈撳叆鑻辫鍙ュ瓙...';

                if (event.error === 'network' || event.error === 'service-not-allowed') {
                    showVoiceInputNotice();
                } else {
                    let errorMsg = '璇煶璇嗗埆鍑洪敊';
                    switch (event.error) {
                        case 'not-allowed':
                            errorMsg = '鉂?璇峰厑璁搁害鍏嬮鏉冮檺锛氱偣鍑绘祻瑙堝櫒鍦板潃鏍忓乏渚х殑閿佸浘鏍?鈫?鍏佽楹﹀厠椋?;
                            break;
                        case 'no-speech':
                            errorMsg = '鉂?鏈娴嬪埌璇煶锛岃灏濊瘯澶у０璇磋瘽';
                            break;
                        case 'audio-capture':
                            errorMsg = '鉂?鏃犳硶璁块棶楹﹀厠椋庯紝璇锋鏌ヨ澶囨槸鍚︽湁楹﹀厠椋?;
                            break;
                        default:
                            errorMsg = '鉂?閿欒锛? + event.error;
                    }
                    updateVoiceStatus(errorMsg);
                }
            };

            try {
                voiceRecognition.start();
                updateVoiceStatus('馃攧 姝ｅ湪鍚姩璇煶璇嗗埆...');
            } catch (error) {
                console.error('鍚姩澶辫触:', error);
                showVoiceInputNotice();
            }
        }

        function showVoiceInputNotice() {
            updateVoiceStatus('鈿狅笍 璇煶杈撳叆鍦ㄥ綋鍓嶇綉缁滅幆澧冧笅涓嶅彲鐢?);
            const notice = document.createElement('div');
            notice.style.cssText = 'margin-top: 12px; padding: 16px; background: #fffbeb; border: 1px solid #fcd34d; border-radius: 8px; font-size: 14px; line-height: 1.6;';
            notice.innerHTML = `
                <p style="font-weight: bold; color: #92400e; margin-bottom: 8px;">馃摫 璇煶杈撳叆鎻愮ず</p>
                <p>鐢变簬缃戠粶鐜闄愬埗锛孋hrome娴忚鍣ㄧ殑璇煶璇嗗埆鏈嶅姟鏆傛椂涓嶅彲鐢ㄣ€?/p>
                <p style="margin-top: 8px;"><strong>瑙ｅ喅鏂规锛?/strong></p>
                <ul style="margin: 8px 0 0 20px; padding: 0;">
                    <li>馃摬 <strong>iOS鐢ㄦ埛</strong>锛氳浣跨敤 Safari 娴忚鍣ㄦ墦寮€鏈簲鐢紙浣跨敤Apple璇煶鏈嶅姟锛?/li>
                    <li>馃 <strong>Android鐢ㄦ埛</strong>锛氳浣跨敤鏂囨湰杈撳叆鏂瑰紡锛屾垨浣跨敤VPN</li>
                    <li>馃敜 鏆傛椂鍙互鐩存帴鍦ㄨ緭鍏ユ涓緭鍏ヨ嫳璇彞瀛?/li>
                </ul>
            `;

            const chatArea = document.querySelector('#tab-ai-chat .card');
            const existingNotice = chatArea.querySelector('.voice-notice');
            if (existingNotice) {
                existingNotice.remove();
            }
            notice.className = 'voice-notice';
            chatArea.appendChild(notice);
        }



        function updateVoiceStatus(msg) {
            let statusDiv = document.getElementById('voice-status');
            if (!statusDiv) {
                const chatArea = document.querySelector('#tab-ai-chat .card');
                statusDiv = document.createElement('div');
                statusDiv.id = 'voice-status';
                statusDiv.style.cssText = 'margin-top: 8px; padding: 8px 12px; background: #f8fafc; border-radius: 8px; font-size: 13px; color: #6b7280; text-align: center;';
                chatArea.appendChild(statusDiv);
            }
            statusDiv.textContent = msg;
        }

        let currentChatTopic = '';

        function startChatWithTopic() {
            const topicSelect = document.getElementById('chat-topic');
            currentChatTopic = topicSelect.value;
            if (!currentChatTopic) {
                const topics = ['鏃ュ父瀵硅瘽', '鏃呰', '椁愬巺鐐归', '璐墿', '宸ヤ綔闈㈣瘯', '瀛︽牎鐢熸椿', '澶╂皵', '鐖卞ソ', '鍋ュ悍'];
                currentChatTopic = topics[Math.floor(Math.random() * topics.length)];
            }
            const container = document.getElementById('chat-messages');
            const levelInfo = VOCABULARY_LEVELS[currentUser.level || 1];
            container.innerHTML = `
                <div style="display: flex; justify-content: flex-start; margin-bottom: 12px;">
                    <div style="background: #f3f4f6; color: #1f2937; padding: 12px 16px; border-radius: 16px 16px 16px 0; max-width: 80%;">
                        馃幆 璇濋锛?{currentChatTopic}
                        <br><small style="color: #6b7280;">闅惧害锛?{levelInfo.cefr}</small>
                        <br>Let's talk about ${currentChatTopic} in English! I'll start the conversation.
                    </div>
                </div>
            `;
            chatMessages = [];
            setTimeout(() => {
                const levelDesc = LEVEL_DESCRIPTIONS[currentUser.level || 1] || LEVEL_DESCRIPTIONS[1];
                const prompt = `璇峰紑鍚叧浜?${currentChatTopic}"鐨勫璇濄€備綘鏄璇濈殑涓诲鑰咃紝涓诲姩鎻愰棶寮曞鐢ㄦ埛鍙備笌銆傞毦搴︾骇鍒細${levelDesc}銆傝鐢ㄨ嫳璇洖澶嶃€俙;
                callAI(prompt, `浣犳槸涓€涓嫳璇璇濈粌涔犱紮浼达紝涓诲鍏充簬"${currentChatTopic}"鐨勫璇濄€傜敤鑻辫鎻愰棶锛屽紩瀵肩敤鎴峰弬涓庡璇濄€傛牴鎹敤鎴锋按骞筹紙CEFR ${levelInfo.cefr}锛夎皟鏁磋瑷€闅惧害銆俙).then(response => {
                    chatMessages.push({ role: 'assistant', content: response });
                    container.innerHTML += `
                        <div style="display: flex; justify-content: flex-start; margin-bottom: 12px;">
                            <div style="background: #f3f4f6; color: #1f2937; padding: 12px 16px; border-radius: 16px 16px 16px 0; max-width: 80%;">
                                ${response}
                            </div>
                            <button class="speak-btn" onclick="speak('${response.replace(/'/g, "\\'")}')" title="鍚彂闊? style="margin-left: 8px;">馃攰</button>
                        </div>
                    `;
                    container.scrollTop = container.scrollHeight;
                    if (document.getElementById('chat-auto-speak').checked) {
                        speak(response);
                    }
                }).catch(e => {
                    console.error('Chat error:', e);
                });
            }, 500);
        }

        async function sendChatMessage() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            if (!message) return;

            const container = document.getElementById('chat-messages');
            chatMessages.push({ role: 'user', content: message });

            container.innerHTML += `
                <div style="display: flex; justify-content: flex-end; margin-bottom: 12px;">
                    <div style="background: #667eea; color: white; padding: 12px 16px; border-radius: 16px 16px 0 16px; max-width: 80%;">
                        ${message}
                    </div>
                </div>
            `;

            input.value = '';
            container.scrollTop = container.scrollHeight;

            try {
                const levelInfo = VOCABULARY_LEVELS[currentUser.level || 1];
                const topicPrompt = currentChatTopic ? `璇濋锛?{currentChatTopic}銆俙 : '';
                const prompt = `${topicPrompt}鐢ㄦ埛璇达細${message}\n璇风敤鑻辫鍥炲锛屼繚鎸佸璇濊嚜鐒躲€備綘鏄璇濈殑涓诲鑰咃紝閫傚綋鎻愰棶寮曞鐢ㄦ埛缁х画瀵硅瘽銆傜敤鎴峰綋鍓嶇瓑绾э細Level ${currentUser.level || 1} (CEFR ${levelInfo.cefr})銆俙;
                const response = await callAI(prompt, `浣犳槸涓€涓嫳璇璇濈粌涔犱紮浼达紝涓诲瀵硅瘽銆?{currentChatTopic ? `璇濋鏄?${currentChatTopic}"銆俙 : ''}鐢ㄨ嫳璇笌鐢ㄦ埛杩涜鑷劧瀵硅瘽锛岄€傚綋鎻愰棶寮曞銆傛牴鎹敤鎴锋按骞筹紙CEFR ${levelInfo.cefr}锛夎皟鏁磋瑷€闅惧害銆俙);

                chatMessages.push({ role: 'assistant', content: response });

                container.innerHTML += `
                    <div style="display: flex; justify-content: flex-start; margin-bottom: 12px;">
                        <div style="background: #f3f4f6; color: #1f2937; padding: 12px 16px; border-radius: 16px 16px 16px 0; max-width: 80%;">
                            ${response}
                        </div>
                        <button class="speak-btn" onclick="speak('${response.replace(/'/g, "\\'")}')" title="鍚彂闊? style="margin-left: 8px;">馃攰</button>
                    </div>
                `;

                container.scrollTop = container.scrollHeight;

                if (document.getElementById('chat-auto-speak').checked) {
                    speak(response);
                }
            } catch (error) {
                container.innerHTML += `
                    <div style="display: flex; justify-content: flex-start; margin-bottom: 12px;">
                        <div style="background: #fee2e2; color: #991b1b; padding: 12px 16px; border-radius: 16px 16px 16px 0;">
                            瀵硅瘽澶辫触锛岃閲嶈瘯
                        </div>
                    </div>
                `;
            }
        }

        function clearChat() {
            chatMessages = [];
            currentChatTopic = '';
            document.getElementById('chat-messages').innerHTML = '';
            const topicSelect = document.getElementById('chat-topic');
            if (topicSelect) {
                topicSelect.value = '';
            }
        }
    </script>
