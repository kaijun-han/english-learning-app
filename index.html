<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI英语学习智能体</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #667eea;
            color: #667eea;
        }

        .input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 16px;
            margin-bottom: 12px;
        }

        .input:focus {
            outline: none;
            border-color: #667eea;
        }

        .word-card {
            background: #f8fafc;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }

        .word {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .phonetic {
            color: #6b7280;
            font-style: italic;
        }

        .meaning {
            font-size: 18px;
            color: #374151;
            margin: 8px 0;
        }

        .example {
            color: #9ca3af;
            font-style: italic;
        }

        .progress-bar {
            height: 20px;
            background: #e5e7eb;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.5s;
        }

        .nav {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .nav-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            cursor: pointer;
            font-size: 14px;
        }

        .nav-btn.active {
            background: rgba(255, 255, 255, 0.9);
            color: #667eea;
        }

        .hidden {
            display: none !important;
        }

        .rating {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .star {
            font-size: 32px;
            cursor: pointer;
            color: #e5e7eb;
            transition: color 0.2s;
        }

        .star:hover,
        .star.selected {
            color: #fbbf24;
        }

        .speak-btn {
            background: #667eea;
            color: white;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            cursor: pointer;
            font-size: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .speak-btn:hover {
            transform: scale(1.1);
        }

        .quiz-option {
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 8px;
        }

        .quiz-option:hover {
            border-color: #667eea;
            background: #f8fafc;
        }

        .quiz-option.selected {
            border-color: #667eea;
            background: #eef2ff;
        }

        .quiz-option.correct {
            border-color: #10b981;
            background: #d1fae5;
        }

        .quiz-option.wrong {
            border-color: #ef4444;
            background: #fee2e2;
        }
    </style>
</head>

<body>
    <div class="container">
        <div id="login-page">
            <div class="card">
                <h1 style="text-align: center; color: #667eea; margin-bottom: 24px;">AI英语学习智能体</h1>
                <input type="text" id="username" class="input" placeholder="用户名" />
                <input type="password" id="password" class="input" placeholder="密码" />
                <button class="btn btn-primary" onclick="login()">登录</button>
                <button class="btn btn-outline" onclick="register()" style="width: 100%;">注册新用户</button>
            </div>
        </div>

        <div id="main-page" class="hidden">
            <div class="nav">
                <button class="nav-btn active" onclick="switchTab('home')">首页</button>
                <button class="nav-btn" onclick="switchTab('words')">单词学习</button>
                <button class="nav-btn" onclick="switchTab('lessons')">课文学习</button>
                <button class="nav-btn" onclick="switchTab('quiz')">AI测试</button>
                <button class="nav-btn" onclick="switchTab('progress')">学习进度</button>
                <button class="nav-btn" onclick="logout()" style="margin-left: auto;">退出</button>
            </div>

            <div id="tab-home">
                <div class="card">
                    <h2>👋 欢迎回来！</h2>
                    <p id="greeting" style="margin: 12px 0; color: #6b7280;">今天也要努力学习哦！</p>
                    <button class="btn btn-primary" onclick="startLevelTest()">📝 英语水平测试</button>
                    <button class="btn btn-success" onclick="startDailyLearning()" style="margin-left: 12px;">📚
                        开始今日学习</button>
                </div>
                <div class="card">
                    <h3>📊 学习概览</h3>
                    <div id="overview-stats"
                        style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-top: 16px;">
                        <div style="text-align: center; padding: 12px; background: #f8fafc; border-radius: 8px;">
                            <div id="stat-total" style="font-size: 24px; font-weight: bold; color: #667eea;">0</div>
                            <div style="color: #6b7280; font-size: 14px;">已学单词</div>
                        </div>
                        <div style="text-align: center; padding: 12px; background: #f8fafc; border-radius: 8px;">
                            <div id="stat-mastered" style="font-size: 24px; font-weight: bold; color: #10b981;">0</div>
                            <div style="color: #6b7280; font-size: 14px;">已掌握</div>
                        </div>
                        <div style="text-align: center; padding: 12px; background: #f8fafc; border-radius: 8px;">
                            <div id="stat-streak" style="font-size: 24px; font-weight: bold; color: #f59e0b;">0</div>
                            <div style="color: #6b7280; font-size: 14px;">连续天数</div>
                        </div>
                        <div style="text-align: center; padding: 12px; background: #f8fafc; border-radius: 8px;">
                            <div id="stat-level" style="font-size: 24px; font-weight: bold; color: #8b5cf6;">1</div>
                            <div style="color: #6b7280; font-size: 14px;">当前等级</div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="tab-words" class="hidden">
                <div class="card">
                    <h2>📚 单词学习</h2>
                    <div style="display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap;">
                        <select id="word-level" class="input" style="width: auto;">
                            <option value="1">Level 1 - 入门</option>
                            <option value="2">Level 2 - 基础</option>
                            <option value="3">Level 3 - 进阶</option>
                            <option value="4">Level 4 - 高级</option>
                            <option value="5">Level 5 - 精通</option>
                        </select>
                        <button class="btn btn-primary" onclick="loadWords()">加载单词</button>
                    </div>
                    <div id="words-list"></div>
                </div>
            </div>

            <div id="tab-lessons" class="hidden">
                <div class="card">
                    <h2>📖 课文学习</h2>
                    <div style="display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap;">
                        <select id="lesson-level" class="input" style="width: auto;">
                            <option value="1">Level 1 - 入门</option>
                            <option value="2">Level 2 - 基础</option>
                            <option value="3">Level 3 - 进阶</option>
                            <option value="4">Level 4 - 高级</option>
                            <option value="5">Level 5 - 精通</option>
                        </select>
                        <button class="btn btn-primary" onclick="loadLessons()">加载课文</button>
                    </div>
                    <div id="lessons-list"></div>
                </div>
            </div>

            <div id="tab-quiz" class="hidden">
                <div class="card">
                    <h2>🧠 AI测试</h2>
                    <button class="btn btn-primary" onclick="generateQuiz()">生成测试题</button>
                    <div id="quiz-container"></div>
                </div>
            </div>

            <div id="tab-progress" class="hidden">
                <div class="card">
                    <h2>📊 学习进度</h2>
                    <div id="progress-details"></div>
                </div>
            </div>
        </div>

        <div id="learning-modal" class="hidden"
            style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000;">
            <div class="card" style="max-width: 500px; width: 90%;">
                <button class="btn btn-danger" onclick="closeLearningModal()" style="float: right;">✕</button>
                <h2 id="learning-word-title">单词学习</h2>
                <div id="learning-word-content" style="margin: 20px 0;"></div>
                <div class="rating" id="rating-stars">
                    <span class="star" onclick="selectRating(1)">★</span>
                    <span class="star" onclick="selectRating(2)">★</span>
                    <span class="star" onclick="selectRating(3)">★</span>
                    <span class="star" onclick="selectRating(4)">★</span>
                    <span class="star" onclick="selectRating(5)">★</span>
                </div>
                <button class="btn btn-primary" onclick="submitRating()"
                    style="margin-top: 16px; width: 100%;">提交评分</button>
            </div>
        </div>

        <div id="test-modal" class="hidden"
            style="position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: flex; align-items: center; justify-content: center; z-index: 1000;">
            <div class="card" style="max-width: 600px; width: 90%;">
                <button class="btn btn-danger" onclick="closeTestModal()" style="float: right;">✕</button>
                <h2>📝 英语水平测试</h2>
                <div id="test-questions"></div>
                <button class="btn btn-primary" onclick="submitTest()"
                    style="margin-top: 16px; width: 100%;">提交测试</button>
            </div>
        </div>
    </div>

    <script>
        const words = [
            { id: 1, word: 'apple', phonetic: '/ˈæpl/', meaning: '苹果', example: 'I eat an apple every day.', level: 1 },
            { id: 2, word: 'book', phonetic: '/bʊk/', meaning: '书', example: 'This is a good book.', level: 1 },
            { id: 3, word: 'cat', phonetic: '/kæt/', meaning: '猫', example: 'The cat is sleeping.', level: 1 },
            { id: 4, word: 'dog', phonetic: '/dɒɡ/', meaning: '狗', example: 'I have a pet dog.', level: 1 },
            { id: 5, word: 'elephant', phonetic: '/ˈelɪfənt/', meaning: '大象', example: 'Elephants are very big.', level: 1 },
            { id: 6, word: 'friend', phonetic: '/frend/', meaning: '朋友', example: 'She is my best friend.', level: 2 },
            { id: 7, word: 'garden', phonetic: '/ˈɡɑːdn/', meaning: '花园', example: 'We have a beautiful garden.', level: 2 },
            { id: 8, word: 'happy', phonetic: '/ˈhæpi/', meaning: '快乐的', example: 'I am very happy today.', level: 2 },
            { id: 9, word: 'important', phonetic: '/ɪmˈpɔːtnt/', meaning: '重要的', example: 'This is very important.', level: 3 },
            { id: 10, word: 'journey', phonetic: '/ˈdʒɜːni/', meaning: '旅程', example: 'It was a long journey.', level: 3 },
            { id: 11, word: 'knowledge', phonetic: '/ˈnɒlɪdʒ/', meaning: '知识', example: 'Knowledge is power.', level: 4 },
            { id: 12, word: 'language', phonetic: '/ˈlæŋɡwɪdʒ/', meaning: '语言', example: 'English is a global language.', level: 4 },
            { id: 13, word: 'mysterious', phonetic: '/mɪˈstɪəriəs/', meaning: '神秘的', example: 'It was a mysterious event.', level: 5 },
            { id: 14, word: 'necessary', phonetic: '/ˈnesəsəri/', meaning: '必要的', example: 'It is necessary to study.', level: 4 },
            { id: 15, word: 'opportunity', phonetic: '/ˌɒpəˈtjuːnəti/', meaning: '机会', example: 'This is a great opportunity.', level: 5 },
            { id: 16, word: 'beautiful', phonetic: '/ˈbjuːtɪfl/', meaning: '美丽的', example: 'What a beautiful day!', level: 2 },
            { id: 17, word: 'computer', phonetic: '/kəmˈpjuːtər/', meaning: '电脑', example: 'I use my computer every day.', level: 2 },
            { id: 18, word: 'different', phonetic: '/ˈdɪfrənt/', meaning: '不同的', example: 'We have different opinions.', level: 3 },
            { id: 19, word: 'experience', phonetic: '/ɪkˈspɪəriəns/', meaning: '经验', example: 'She has rich experience.', level: 4 },
            { id: 20, word: 'fantastic', phonetic: '/fænˈtæstɪk/', meaning: '极好的', example: 'That was a fantastic movie.', level: 3 }
        ];

        const lessons = [
            {
                id: 1,
                title: 'My Daily Life',
                content: 'I wake up early every morning. After breakfast, I go to school. I study English every day because it is very important. In the afternoon, I play sports with my friends.',
                level: 1,
                words: [
                    { word: 'morning', meaning: '早晨' },
                    { word: 'breakfast', meaning: '早餐' },
                    { word: 'school', meaning: '学校' },
                    { word: 'afternoon', meaning: '下午' },
                    { word: 'friends', meaning: '朋友' }
                ]
            },
            {
                id: 2,
                title: 'The Beautiful Garden',
                content: 'There is a beautiful garden in our neighborhood. It has many colorful flowers and tall trees. I like to walk in the garden every evening. It makes me feel happy and relaxed.',
                level: 2,
                words: [
                    { word: 'beautiful', meaning: '美丽的' },
                    { word: 'garden', meaning: '花园' },
                    { word: 'colorful', meaning: '彩色的' },
                    { word: 'flowers', meaning: '花' },
                    { word: 'relaxed', meaning: '放松的' }
                ]
            },
            {
                id: 3,
                title: 'Learning English',
                content: 'Learning English is very important in today\'s world. It opens many doors to new opportunities. With English, you can communicate with people from all over the world. Practice makes perfect!',
                level: 3,
                words: [
                    { word: 'important', meaning: '重要的' },
                    { word: 'opportunities', meaning: '机会' },
                    { word: 'communicate', meaning: '交流' },
                    { word: 'practice', meaning: '练习' },
                    { word: 'perfect', meaning: '完美的' }
                ]
            },
            {
                id: 4,
                title: 'Knowledge is Power',
                content: 'Knowledge is power. The more you learn, the more you know. Reading books is a great way to gain knowledge. It helps you understand the world better and make better decisions.',
                level: 4,
                words: [
                    { word: 'knowledge', meaning: '知识' },
                    { word: 'power', meaning: '力量' },
                    { word: 'reading', meaning: '阅读' },
                    { word: 'understand', meaning: '理解' },
                    { word: 'decisions', meaning: '决定' }
                ]
            },
            {
                id: 5,
                title: 'The Journey of Life',
                content: 'Life is a long journey full of mysterious experiences. Every day brings new challenges and opportunities. It is necessary to embrace change and keep learning. The journey itself is the reward.',
                level: 5,
                words: [
                    { word: 'journey', meaning: '旅程' },
                    { word: 'mysterious', meaning: '神秘的' },
                    { word: 'challenges', meaning: '挑战' },
                    { word: 'necessary', meaning: '必要的' },
                    { word: 'embrace', meaning: '拥抱' }
                ]
            }
        ];

        let currentUser = null;
        let currentLearningWord = null;
        let currentRating = 0;
        let currentTestAnswers = [];

        function init() {
            const savedUser = localStorage.getItem('english-learning-user');
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                showMainPage();
            }
        }

        init();

        function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const users = JSON.parse(localStorage.getItem('english-learning-users') || '[]');
            const user = users.find(u => u.username === username && u.password === password);
            if (user) {
                currentUser = user;
                localStorage.setItem('english-learning-user', JSON.stringify(user));
                showMainPage();
            } else {
                alert('用户名或密码错误');
            }
        }

        function register() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            if (!username || !password) {
                alert('请输入用户名和密码');
                return;
            }
            const users = JSON.parse(localStorage.getItem('english-learning-users') || '[]');
            if (users.find(u => u.username === username)) {
                alert('用户名已存在');
                return;
            }
            const newUser = {
                id: Date.now(),
                username,
                password,
                level: 1,
                streak: 0,
                lastStudyDate: null,
                totalWordsLearned: 0,
                progress: { learning: 0, mastered: 0 },
                wordProgress: {},
                createdAt: new Date().toISOString()
            };
            users.push(newUser);
            localStorage.setItem('english-learning-users', JSON.stringify(users));
            alert('注册成功，请登录');
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('english-learning-user');
            document.getElementById('login-page').classList.remove('hidden');
            document.getElementById('main-page').classList.add('hidden');
        }

        function showMainPage() {
            document.getElementById('login-page').classList.add('hidden');
            document.getElementById('main-page').classList.remove('hidden');
            loadOverview();
        }

        function switchTab(tab) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            const btns = document.querySelectorAll('.nav-btn');
            const tabNames = ['home', 'words', 'lessons', 'quiz', 'progress'];
            const idx = tabNames.indexOf(tab);
            if (idx >= 0 && idx < btns.length) {
                btns[idx].classList.add('active');
            }
            document.querySelectorAll('[id^="tab-"]').forEach(t => t.classList.add('hidden'));
            document.getElementById('tab-' + tab).classList.remove('hidden');
            if (tab === 'progress') loadProgress();
        }

        function loadOverview() {
            if (!currentUser) return;
            document.getElementById('stat-total').textContent = currentUser.totalWordsLearned || 0;
            document.getElementById('stat-mastered').textContent = currentUser.progress?.mastered || 0;
            document.getElementById('stat-streak').textContent = currentUser.streak || 0;
            document.getElementById('stat-level').textContent = currentUser.level || 1;
        }

        function speak(text) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = 'en-US';
                utterance.rate = 0.8;
                window.speechSynthesis.speak(utterance);
            } else {
                alert('您的浏览器不支持语音功能');
            }
        }

        function loadWords() {
            const level = parseInt(document.getElementById('word-level').value);
            const filtered = words.filter(w => w.level <= level);
            const list = document.getElementById('words-list');
            list.innerHTML = filtered.map(w => `
                <div class="word-card">
                    <div style="display: flex; align-items: center; gap: 8px;">
                        <div class="word">${w.word}</div>
                        <button class="speak-btn" onclick="speak('${w.word}')" title="发音">🔊</button>
                    </div>
                    <div class="phonetic">${w.phonetic}</div>
                    <div class="meaning">${w.meaning}</div>
                    <div class="example">${w.example}</div>
                    <button class="btn btn-success" onclick="startLearning(${w.id})" style="margin-top: 12px;">开始学习</button>
                </div>
            `).join('');
        }

        function loadLessons() {
            const level = parseInt(document.getElementById('lesson-level').value);
            const filtered = lessons.filter(l => l.level <= level);
            const list = document.getElementById('lessons-list');
            list.innerHTML = filtered.map(l => `
                <div class="word-card">
                    <h3>${l.title}</h3>
                    <p style="margin: 12px 0; line-height: 1.6;">${l.content}</p>
                    <h4>关键词汇：</h4>
                    <div style="margin: 8px 0;">
                        ${l.words?.map(w => `<span style="background: #eef2ff; padding: 4px 8px; border-radius: 4px; margin-right: 8px; cursor: pointer;" onclick="speak('${w.word}')" title="点击发音">${w.word} - ${w.meaning} 🔊</span>`).join('') || ''}
                    </div>
                </div>
            `).join('');
        }

        function startLearning(wordId) {
            currentLearningWord = words.find(w => w.id === wordId);
            if (!currentLearningWord) return;
            document.getElementById('learning-word-title').innerHTML = `${currentLearningWord.word} <button class="speak-btn" onclick="speak('${currentLearningWord.word}')" title="发音">🔊</button>`;
            document.getElementById('learning-word-content').innerHTML = `
                <div class="phonetic">${currentLearningWord.phonetic}</div>
                <div class="meaning">${currentLearningWord.meaning}</div>
                <div class="example">${currentLearningWord.example}</div>
            `;
            currentRating = 0;
            document.querySelectorAll('.star').forEach(s => s.classList.remove('selected'));
            document.getElementById('learning-modal').classList.remove('hidden');
        }

        function selectRating(rating) {
            currentRating = rating;
            document.querySelectorAll('.star').forEach((s, i) => {
                s.classList.toggle('selected', i < rating);
            });
        }

        function submitRating() {
            if (!currentRating) {
                alert('请选择评分');
                return;
            }
            const wordId = currentLearningWord.id;
            if (!currentUser.wordProgress[wordId]) {
                currentUser.wordProgress[wordId] = {
                    repetitions: 0,
                    interval: 1,
                    easeFactor: 2.5,
                    nextReviewDate: new Date().toISOString(),
                    status: 'learning'
                };
                currentUser.totalWordsLearned++;
                currentUser.progress.learning++;
            }

            const progress = currentUser.wordProgress[wordId];
            if (currentRating >= 4) {
                if (progress.repetitions === 0) {
                    progress.interval = 1;
                } else if (progress.repetitions === 1) {
                    progress.interval = 6;
                } else {
                    progress.interval = Math.round(progress.interval * progress.easeFactor);
                }
                progress.easeFactor = Math.max(1.3, progress.easeFactor + (0.1 - (5 - currentRating) * (0.08 + (5 - currentRating) * 0.02)));
                progress.repetitions++;
                if (progress.repetitions >= 3 && currentRating >= 4) {
                    progress.status = 'mastered';
                    currentUser.progress.mastered++;
                    currentUser.progress.learning--;
                }
            } else {
                progress.repetitions = 0;
                progress.interval = 1;
                progress.status = 'learning';
            }

            const nextDate = new Date();
            nextDate.setDate(nextDate.getDate() + progress.interval);
            progress.nextReviewDate = nextDate.toISOString();

            updateStreak();
            saveUser();
            closeLearningModal();
            loadOverview();
            alert('学习记录已保存！');
        }

        function updateStreak() {
            const today = new Date().toDateString();
            if (currentUser.lastStudyDate !== today) {
                const yesterday = new Date();
                yesterday.setDate(yesterday.getDate() - 1);
                if (currentUser.lastStudyDate === yesterday.toDateString()) {
                    currentUser.streak++;
                } else if (currentUser.lastStudyDate !== today) {
                    currentUser.streak = 1;
                }
                currentUser.lastStudyDate = today;
            }
        }

        function saveUser() {
            localStorage.setItem('english-learning-user', JSON.stringify(currentUser));
            const users = JSON.parse(localStorage.getItem('english-learning-users') || '[]');
            const index = users.findIndex(u => u.id === currentUser.id);
            if (index !== -1) {
                users[index] = currentUser;
                localStorage.setItem('english-learning-users', JSON.stringify(users));
            }
        }

        function closeLearningModal() {
            document.getElementById('learning-modal').classList.add('hidden');
            currentLearningWord = null;
        }

        function generateQuiz() {
            const level = currentUser.level || 1;
            const availableWords = words.filter(w => w.level <= level);
            const shuffled = [...availableWords].sort(() => Math.random() - 0.5);
            const selected = shuffled.slice(0, 5);

            const questions = selected.map(word => {
                const otherWords = words.filter(w => w.id !== word.id && w.level <= level);
                const wrongOptions = [...otherWords].sort(() => Math.random() - 0.5).slice(0, 3);
                const options = [...wrongOptions, { meaning: word.meaning }].sort(() => Math.random() - 0.5);
                return {
                    question: `What does "${word.word}" mean?`,
                    options: options.map(o => o.meaning),
                    correctAnswer: word.meaning
                };
            });

            const container = document.getElementById('quiz-container');
            container.innerHTML = `
                <div id="quiz-questions">
                    ${questions.map((q, i) => `
                        <div style="margin-bottom: 20px;">
                            <h4>问题 ${i + 1}: ${q.question}</h4>
                            ${q.options.map((opt, j) => `
                                <div class="quiz-option" onclick="selectQuizAnswer(${i}, ${j})" id="quiz-${i}-${j}">
                                    ${String.fromCharCode(65 + j)}. ${opt}
                                </div>
                            `).join('')}
                        </div>
                    `).join('')}
                </div>
                <button class="btn btn-primary" onclick="submitQuiz()">提交答案</button>
            `;
            window.quizData = questions;
        }

        let quizAnswers = [];

        function selectQuizAnswer(questionIdx, optionIdx) {
            quizAnswers[questionIdx] = optionIdx;
            document.querySelectorAll(`[id^="quiz-${questionIdx}-"]`).forEach(el => el.classList.remove('selected'));
            document.getElementById(`quiz-${questionIdx}-${optionIdx}`).classList.add('selected');
        }

        function submitQuiz() {
            if (!window.quizData) return;
            let correct = 0;
            window.quizData.forEach((q, i) => {
                const selectedOption = q.options[quizAnswers[i]];
                if (selectedOption === q.correctAnswer) {
                    correct++;
                    document.getElementById(`quiz-${i}-${quizAnswers[i]}`).classList.add('correct');
                } else {
                    document.getElementById(`quiz-${i}-${quizAnswers[i]}`).classList.add('wrong');
                }
            });
            const total = window.quizData.length;
            const percentage = Math.round((correct / total) * 100);
            alert(`测试完成！得分：${correct}/${total} (${percentage}%)`);
            if (percentage >= 80 && currentUser.level < 5) {
                currentUser.level++;
                saveUser();
                alert(`🎉 恭喜！您的等级已提升到 Level ${currentUser.level}`);
            }
            loadOverview();
        }

        function loadProgress() {
            if (!currentUser) return;
            const details = document.getElementById('progress-details');
            const total = currentUser.progress?.learning + currentUser.progress?.mastered || 0;
            const mastered = currentUser.progress?.mastered || 0;
            details.innerHTML = `
                <div style="margin-bottom: 20px;">
                    <h3>单词掌握进度</h3>
                    <div class="progress-bar">
                        <div class="progress-fill" style="width: ${total ? (mastered / total * 100) : 0}%"></div>
                    </div>
                    <p style="margin-top: 8px;">已掌握 ${mastered} / ${total} 个单词</p>
                </div>
                <div>
                    <h3>学习统计</h3>
                    <p>连续学习：${currentUser.streak || 0} 天</p>
                    <p>当前等级：Level ${currentUser.level || 1}</p>
                    <p>累计学习单词：${currentUser.totalWordsLearned || 0} 个</p>
                </div>
            `;
        }

        function startLevelTest() {
            const levelQuestions = [
                { question: 'What is the meaning of "apple"?', options: ['苹果', '香蕉', '橙子', '梨'], answer: 0 },
                { question: 'What is the meaning of "book"?', options: ['书', '笔', '桌子', '椅子'], answer: 0 },
                { question: 'What is the meaning of "happy"?', options: ['悲伤的', '快乐的', '愤怒的', '疲惫的'], answer: 1 },
                { question: 'What is the meaning of "important"?', options: ['重要的', '简单的', '困难的', '无聊的'], answer: 0 },
                { question: 'What is the meaning of "knowledge"?', options: ['力量', '知识', '金钱', '时间'], answer: 1 }
            ];

            currentTestAnswers = new Array(levelQuestions.length).fill(null);
            const container = document.getElementById('test-questions');
            container.innerHTML = levelQuestions.map((q, i) => `
                <div style="margin-bottom: 20px;">
                    <h4>问题 ${i + 1}: ${q.question}</h4>
                    ${q.options.map((opt, j) => `
                        <div class="quiz-option" onclick="selectTestAnswer(${i}, ${j})" id="test-${i}-${j}">
                            ${String.fromCharCode(65 + j)}. ${opt}
                        </div>
                    `).join('')}
                </div>
            `).join('');
            window.levelTestData = levelQuestions;
            document.getElementById('test-modal').classList.remove('hidden');
        }

        function selectTestAnswer(questionIdx, optionIdx) {
            currentTestAnswers[questionIdx] = optionIdx;
            document.querySelectorAll(`[id^="test-${questionIdx}-"]`).forEach(el => el.classList.remove('selected'));
            document.getElementById(`test-${questionIdx}-${optionIdx}`).classList.add('selected');
        }

        function submitTest() {
            if (!window.levelTestData) return;
            let correct = 0;
            window.levelTestData.forEach((q, i) => {
                if (currentTestAnswers[i] === q.answer) {
                    correct++;
                }
            });
            const total = window.levelTestData.length;
            let newLevel = 1;
            if (correct <= 1) newLevel = 1;
            else if (correct <= 2) newLevel = 2;
            else if (correct <= 3) newLevel = 3;
            else if (correct <= 4) newLevel = 4;
            else newLevel = 5;
            currentUser.level = newLevel;
            saveUser();
            alert(`测试完成！\n得分：${correct}/${total}\n评定等级：Level ${newLevel}`);
            closeTestModal();
            loadOverview();
        }

        function closeTestModal() {
            document.getElementById('test-modal').classList.add('hidden');
            currentTestAnswers = [];
        }

        function startDailyLearning() {
            const level = currentUser.level || 1;
            const reviewCount = Object.values(currentUser.wordProgress || {}).filter(p => {
                if (!p.nextReviewDate) return false;
                return new Date(p.nextReviewDate) <= new Date();
            }).length;
            const newCount = 5;
            alert(`今日学习任务：\n- 复习单词：${reviewCount} 个\n- 新学单词：${newCount} 个`);
            document.getElementById('word-level').value = level;
            switchTab('words');
            loadWords();
        }
    </script>
</body>

</html>
